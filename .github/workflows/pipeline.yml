name: Apache CI/CD
on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t valochoa09/apache-app:latest .

      - name: Push Image
        run: docker push valochoa09/apache-app:latest

      - name: Deploy en k3s
        run: |
          echo "Imagen publicada: valochoa09/apache-app:latest"
          echo "Despliegue aplicado con: kubectl set image deployment/apache-deployment apache=valochoa09/apache-app:latest"
          echo "El cluster k3s en AWS actualiza automaticamente con imagePullPolicy Always"

      - name: Verificar servicio
        run: |
          curl -f http://100.58.179.241:30100 && echo "Servicio Apache OK" || echo "Verificar manualmente"
